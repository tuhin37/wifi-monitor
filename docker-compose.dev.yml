services:
  exporter:
    image: wifi-monitor-exporter:local
    build:
      context: ./exporter
      dockerfile: Dockerfile.dev
    container_name: wifimon-exporter
    restart: unless-stopped
    network_mode: host
    privileged: true
    environment:
      - EXPORTER_PORT=8501
      - DATA_DIR=/data
      - SCANNER_BACKEND=iw
      - SCANNER_INTERFACE=wlp5s0
      - POLL_INTERVAL=15
    volumes:
      - ./data:/data

  prometheus:
    image: prom/prometheus:latest
    container_name: wifimon-prometheus
    restart: unless-stopped
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-admin-api"
    depends_on: [exporter]

volumes:
  prometheus_data:
