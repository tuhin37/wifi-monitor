# WiFi Monitor - Kismet Site Configuration
#
# This config is loaded on top of the default kismet.conf.
# Place it at ./kismet/kismet_site.conf and uncomment the volume mount
# in docker-compose.yml to use it.
#
# See: https://www.kismetwireless.net/docs/readme/config/

# Server configuration
servername=WiFi Monitor
logtypes=pcapdump,alert,gpsxml
logtemplate=/data/%p_%n_%D-%H-%M-%S

# Enable REST API on all interfaces
restserver=ALLOWED
httpd_allow_login=TRUE

# Memory limits for constrained devices (Raspberry Pi)
# Keep only last N devices in memory
tracker_device_timeout=3600
max_devices=1000

# Don't log alerts by default — keep it lightweight
alertbacklog=1024

# Sources are configured from the host - pass the interface name
# You'll pass the monitor-mode interface via command line or config.
# Example (uncomment and set your interface):
# source=wlan1:type=linuxwifi

# Reduce logging verbosity on resource-constrained devices
logging_level=-1
