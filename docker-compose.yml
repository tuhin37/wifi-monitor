services:

  # Passive 802.11 sniffer
  kismet:
    image: finchsec/kismet:latest
    container_name: wifi-kismet
    restart: unless-stopped
    network_mode: host
    privileged: true
    pid: host
    environment:
      - KISMET_USERNAME=${KISMET_USERNAME:-admin}
      - KISMET_PASSWORD=${KISMET_PASSWORD:-admin}
    volumes:
      - kismet_data:/data
      # - ./kismet/kismet_site.conf:/usr/local/etc/kismet_site.conf:ro
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  # Unified exporter: scanner + speedtest runner + scheduler + Prometheus metrics
  exporter:
    build: ./exporter
    container_name: wifi-exporter
    restart: unless-stopped
    network_mode: host
    privileged: true
    pid: host
    environment:
      - EXPORTER_PORT=${EXPORTER_PORT:-8501}
      - DATA_DIR=${DATA_DIR:-/data}
      - SCANNER_INTERFACE=${SCANNER_INTERFACE:-wlan1}
      - SCANNER_BACKEND=${SCANNER_BACKEND:-kismet}
      - KISMET_URL=${KISMET_URL:-http://127.0.0.1:2501}
      - KISMET_USERNAME=${KISMET_USERNAME:-admin}
      - KISMET_PASSWORD=${KISMET_PASSWORD:-admin}
      - MGMT_INTERFACE=${MGMT_INTERFACE:-wlan0}
      - WIFI_BACKEND=${WIFI_BACKEND:-nmcli}
      - SPEEDTEST_BACKEND=${SPEEDTEST_BACKEND:-speedtest-cli}
      - IPERF3_SERVER=${IPERF3_SERVER:-}
      - POLL_INTERVAL=${POLL_INTERVAL:-15}
    volumes:
      - exporter_data:/data
      - /var/run/dbus:/var/run/dbus:ro
      - /etc/NetworkManager:/etc/NetworkManager:ro
    depends_on:
      - kismet

  # Time-series database
  prometheus:
    image: prom/prometheus:latest
    container_name: wifi-prometheus
    restart: unless-stopped
    ports: ["${PROMETHEUS_PORT:-9090}:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
    depends_on: [exporter]

  # Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: wifi-grafana
    restart: unless-stopped
    ports: ["${GRAFANA_PORT:-3000}:3000"]
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on: [prometheus]

volumes:
  kismet_data:
  exporter_data:
  prometheus_data:
  grafana_data:
